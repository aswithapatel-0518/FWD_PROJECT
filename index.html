<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder - Home</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #ffcc70; /* solid colorful background */
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 {
      color: #007acc;
      margin: 0;
    }

    p {
      font-size: 1.2em;
      color: #444;
      margin: 0;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #007acc;
      color: #fff;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background: #005f99;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Resume Builder</h1>
    <p>Select your template:</p>
    <div class="button-grid">
      <button onclick="location.href='fresher.html'">Fresher Resume</button>
      <button onclick="location.href='professional.html'">Professional Resume</button>
    </div>
  </div>
</body>
</html>
